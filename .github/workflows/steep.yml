name: Type check

on: [pull_request]

jobs:
  steep:
    name: Steep type checking
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true

      - name: Run steep check
        run: bundle exec steep check

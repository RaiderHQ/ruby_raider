name: Build and GitHub Release

on:
  push:
    tags:
      - 'v*.*.*'  # Triggers on version tags like v1.2.0
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.2.0)'
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Build and Create GitHub Release
    runs-on: ubuntu-latest
    if: github.repository_owner == 'RaiderHQ'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Use input from manual trigger
            VERSION="${{ github.event.inputs.version }}"
          else
            # Extract from tag (strips the 'v' prefix)
            VERSION=${GITHUB_REF#refs/tags/v}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Releasing version: $VERSION"

      - name: Verify version matches lib/version
        run: |
          LIB_VERSION=$(cat lib/version | tr -d '[:space:]')
          TAG_VERSION="${{ steps.version.outputs.version }}"
          if [ "$LIB_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: lib/version ($LIB_VERSION) does not match requested version ($TAG_VERSION)"
            exit 1
          fi
          echo "✓ Version verified: $LIB_VERSION"

      - name: Run tests
        run: |
          bundle exec rspec spec/generators/
          bundle exec rspec spec/integration/ --tag ~slow

      - name: Run RuboCop
        run: bundle exec rubocop

      - name: Run Reek
        run: bundle exec reek

      - name: Build gem
        run: |
          gem build ruby_raider.gemspec
          echo "Built: $(ls -1 *.gem)"

      - name: Generate changelog
        id: changelog
        run: |
          VERSION="v${{ steps.version.outputs.version }}"

          # Get the previous tag (exclude current tag)
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${VERSION}$" | head -n 1)

          if [ -z "$PREV_TAG" ]; then
            echo "First release - no previous tag"
            CHANGELOG="Initial release"
          else
            echo "Generating changelog since $PREV_TAG"
            CHANGELOG=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s (%h)" --no-merges)
          fi

          # Extract stats
          FEATURES=$(echo "$CHANGELOG" | grep -ciE "feat|add|new" || true)
          FIXES=$(echo "$CHANGELOG" | grep -ciE "fix|bug" || true)
          CHANGES=$(echo "$CHANGELOG" | grep -c "^-" || true)

          cat > RELEASE_NOTES.md <<EOF
          ## What's Changed
          $CHANGELOG

          ## Statistics
          - Total commits: $CHANGES
          - Features/Additions: $FEATURES
          - Bug fixes: $FIXES

          ## Installation
          \`\`\`bash
          gem install ruby_raider -v ${{ steps.version.outputs.version }}
          \`\`\`
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          # Use the version for the tag name if triggered manually
          tag_name: v${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          body_path: RELEASE_NOTES.md
          files: |
            *.gem
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify success
        if: success()
        run: |
          echo "✓ GitHub Release ${{ steps.version.outputs.version }} created successfully!"
          echo "📦 Gem file attached to release - publish to RubyGems manually when ready"
